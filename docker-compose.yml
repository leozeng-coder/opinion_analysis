version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: opinion-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: opinion_analysis
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opinion-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opinion-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config/config.yaml:/app/config/config.yaml
      - ./backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - GIN_MODE=release
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opinion-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped

  crawler:
    build:
      context: ./crawler
      dockerfile: Dockerfile
    container_name: opinion-crawler
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      - DATABASE_DSN=root:password@tcp(opinion-mysql:3306)/opinion_analysis
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:
