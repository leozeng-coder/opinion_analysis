version: "3.9"

services:
  mysql:
    image: mysql:8.0
    container_name: opinion-mysql
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: opinion_analysis
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-ppassword"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: opinion-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opinion-backend
    ports:
      - "8080:8080"
    volumes:
      - ./backend/config/config.yaml:/app/config/config.yaml
      - ./backend/logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      - GIN_MODE=release
      # 首次启动时的默认 admin 密码，留空则自动随机生成并打到日志
      # - ADMIN_INIT_PASSWORD=change-me-now
    restart: unless-stopped

  # 管理后台（独立 nginx，主 frontend nginx 通过 /admin/ proxy 调用）
  admin-frontend:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: opinion-admin-frontend
    # 仅 docker 内部暴露；通过 frontend nginx /admin/ 代理访问
    # 如需直接访问管理后台（例如独立部署），打开下行注释：
    # ports:
    #   - "5174:80"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opinion-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
      - admin-frontend
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

